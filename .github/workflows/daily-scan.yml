name: daily-scan

on:
  schedule:
    - cron: "0 12 * * *"  # 12:00 UTC = 07:00 ET (08:00 EDT)
  workflow_dispatch:

# Don't trigger ourselves on the seen.db commits we push.
permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --logger "console;verbosity=minimal"

      - name: Run scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: dotnet run --configuration Release --no-build --project src/JobRadar.Console

      - name: Commit updated seen.db
        run: |
          if [[ -n "$(git status --porcelain data/seen.db)" ]]; then
            git config user.name "job-radar bot"
            git config user.email "job-radar-bot@users.noreply.github.com"
            git add data/seen.db
            git commit -m "chore: update seen.db [$(date -u +%Y-%m-%d)]"
            git push
          else
            echo "seen.db unchanged; skipping commit."
          fi
