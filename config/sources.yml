# Per-source parameters for sources that don't read from companies.yml.
#
# Aggregator sources (Remotive, WeWorkRemotely, RemoteOK, HackerNews) need
# their own configuration: which keywords to search for, which feeds to pull,
# etc. Keep stack-specific bias here so the scorer/filter logic in
# JobRadar.Console stays generic.

# Out of scope: Indeed and Glassdoor.
# Both gate scraping behind Cloudflare challenges, CAPTCHAs, and IP rate
# limits, and most of their listings are syndicated duplicates of content the
# radar already gets via direct ATS sources. Adding either properly requires a
# paid syndication API key (Indeed has one for partners) or captcha-solving
# infrastructure — out of band for a personal radar. Decision is deliberate;
# do not re-evaluate without a concrete syndication-API path.
# TODO Indeed / Glassdoor: gated by anti-bot, skip until a paid syndication API is available.

remotive:
  # Remotive's API requires a search term per call; we call once per term and
  # dedupe results by job id. Pick terms that match the candidate's stack.
  search_terms:
    - .net
    - "c#"
    - fullstack
    - full stack

we_work_remotely:
  # WWR exposes one RSS feed per category. Add or remove feeds based on the
  # role types you care about. See https://weworkremotely.com/categories.
  feeds:
    - https://weworkremotely.com/categories/remote-programming-jobs.rss
    - https://weworkremotely.com/categories/remote-full-stack-programming-jobs.rss

jobillico:
  # Quebec's largest job board. The source iterates the cross product of
  # search_terms × locations; each combination is one server-rendered page
  # of ~11 results. Pipeline keyword/location filters narrow further.
  search_terms:
    - software
    - .net
  locations:
    - Outaouais
    - Montreal

# Per-source ATS live-check policy. Before a posting hits the Claude API, the
# pipeline verifies it's still listed on the underlying ATS (or, for aggregator
# sources, that the apply URL still resolves). Modes:
#
#   require_ok   probe and drop the posting if the ATS returns 404 / login wall
#   best_effort  probe and log on failure, but score anyway (the digest may surface
#                stale links)
#   none         skip the probe entirely (legacy behaviour)
#
# Defaults if a source is omitted here:
#   greenhouse | lever | ashby | workable        → require_ok
#   remoteok | remotive | weworkremotely | hn    → best_effort
#   anything else                                → none
live_check:
  greenhouse: require_ok
  lever: require_ok
  ashby: require_ok
  workable: require_ok
  remoteok: best_effort
  remotive: best_effort
  weworkremotely: best_effort
  hackernews: best_effort
  jobillico: best_effort
