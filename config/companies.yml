# Target companies for the ATS-API sources.
#
# Each entry: { name, region, ats, token, notes? }
#
#   ats:    greenhouse | lever | ashby | workable | unknown
#   token:  the company slug used by the ATS API
#           - Greenhouse: visit boards.greenhouse.io/{token} or look at
#             the network call from the company's careers page
#           - Lever:      visit jobs.lever.co/{company}; the URL slug is the token
#           - Ashby:      jobs.ashbyhq.com/{org}
#           - Workable:   apply.workable.com/{account}
#   region: ca-mtl | ca-ott | ca | es-mad | es-bcn | es | global | remote
#
# How to verify the ATS for any company:
#   1. Open their careers page.
#   2. Click a job posting. Look at the URL.
#      - boards.greenhouse.io/...        → Greenhouse, token = next path segment
#      - jobs.lever.co/...               → Lever, token = next path segment
#      - jobs.ashbyhq.com/...            → Ashby, org = next path segment
#      - apply.workable.com/...          → Workable, account = next path segment
#      - Their own domain (e.g. /careers) → check view-source for an iframe
#        pointing to one of the above, or check the network tab for an XHR
#        to one of those domains.
#   3. If none of the above, mark `ats: unknown` and skip for now — don't scrape.
#
# This list is a starting point. Verify each entry before relying on it.

companies:

  # === Canada — Montréal ===
  - name: Lightspeed Commerce
    region: ca-mtl
    ats: ashby
    token: "lightspeedhq"
  - name: Coveo
    region: ca-mtl
    ats: greenhouse
    token: "coveoen"
  - name: Hopper
    region: ca-mtl
    ats: ashby
    token: "hopper"
  - name: Nuvei
    region: ca-mtl
    ats: workable
    token: "nuvei"
  - name: GSoft
    region: ca-mtl
    ats: greenhouse
    token: "workleap"
    notes: GSoft rebranded to Workleap; jobs board is under that slug.
  - name: Genetec
    region: ca-mtl
    ats: workable
    token: "genetec-inc"

  # === Canada — Ottawa / federal-adjacent ===
  - name: Shopify
    region: ca
    ats: unknown
    token: "?"
    notes: Has Ottawa hub; mostly remote-Canada postings. Uses custom in-house careers system at shopify.com/careers — not Greenhouse/Lever/Ashby/Workable.
  - name: Calian Group
    region: ca-ott
    ats: unknown
    token: "?"
    notes: Custom WordPress careers portal at careers.calian.com (WP `/wp/v2/career` REST endpoint); not one of the four supported ATSes.
  - name: Klipfolio
    region: ca-ott
    ats: unknown
    token: "?"
    notes: No active job board — careers page says "all opportunities filled, email careers@klipfolio.com".
  - name: CGI
    region: ca
    ats: unknown
    token: "?"
    notes: Federal contractor; many Ottawa roles. Uses Njoyn (clients.njoyn.com) — not one of the four supported ATSes.

  # === Spain — Madrid / Barcelona ===
  - name: Glovo
    region: es-bcn
    ats: unknown
    token: "?"
    notes: Migrated off Greenhouse to a custom WordPress careers portal at careers.glovoapp.com (jobs loaded via `glovo_filter_jobs` AJAX action).
  - name: Cabify
    region: es-mad
    ats: greenhouse
    token: "cabify"
  - name: Idealista
    region: es-mad
    ats: unknown
    token: "?"
    notes: Uses Teamtailor (careers.idealista.com → app.teamtailor.com) — not one of the four supported ATSes.
  - name: Wallapop
    region: es-bcn
    ats: greenhouse
    token: "wallapop"
  - name: Plain Concepts
    region: es
    ats: workable
    token: "plainconcepts"
    notes: Microsoft Gold Partner; .NET-heavy stack.
  - name: Tokiota
    region: es-mad
    ats: unknown
    token: "?"
    notes: Microsoft consultancy. No public careers page found; tokiota.com has no /careers route and no Greenhouse/Lever/Ashby/Workable account responds.
  - name: Sngular
    region: es
    ats: unknown
    token: "?"
    notes: Self-hosted careers at sngular.com/talent (job pages under /talent-and-culture/jobs/) — not one of the four supported ATSes.

  # === Global / remote-friendly with strong .NET footprint ===
  - name: GitLab
    region: remote
    ats: greenhouse
    token: "gitlab"
  - name: Automattic
    region: remote
    ats: unknown
    token: "?"
    notes: Uses a custom in-house careers system at automattic.com/work-with-us — not one of the four supported ATSes.
  - name: Zapier
    region: remote
    ats: ashby
    token: "zapier"

# First Claude Code task using this file:
