# Target companies for the ATS-API sources.
#
# Each entry: { name, region, ats, token, notes? }
#
#   ats:    greenhouse | lever | ashby | workable | unknown
#   token:  the company slug used by the ATS API
#           - Greenhouse: visit boards.greenhouse.io/{token} or look at
#             the network call from the company's careers page
#           - Lever:      visit jobs.lever.co/{company}; the URL slug is the token
#           - Ashby:      jobs.ashbyhq.com/{org}
#           - Workable:   apply.workable.com/{account}
#   region: ca-mtl | ca-ott | ca | es-mad | es-bcn | es | global | remote
#
# How to verify the ATS for any company:
#   1. Open their careers page.
#   2. Click a job posting. Look at the URL.
#      - boards.greenhouse.io/...        → Greenhouse, token = next path segment
#      - jobs.lever.co/...               → Lever, token = next path segment
#      - jobs.ashbyhq.com/...            → Ashby, org = next path segment
#      - apply.workable.com/...          → Workable, account = next path segment
#      - Their own domain (e.g. /careers) → check view-source for an iframe
#        pointing to one of the above, or check the network tab for an XHR
#        to one of those domains.
#   3. If none of the above, mark `ats: unknown` and skip for now — don't scrape.
#
# This list is a starting point. Verify each entry before relying on it.

companies:

