# Filter configuration — applied before any posting hits the Claude API.
#
# Two-tier keyword scheme:
#   keywords_core:        any one of these alone passes (.NET-specific signal)
#   keywords_broad:       only counts if also paired with a tech_context_hint
#                          anywhere in the title or description
#   tech_context_hints:   .NET / Microsoft-stack signals that "save" a broad
#                          keyword like "software engineer" from being too generic
#
# Rationale: "software engineer" alone matches Rails, Python, Go, JS-only roles
# we don't want. Pairing it with .NET context drops most non-.NET noise.

keywords_core:
  - .net
  - "c#"
  - dotnet
  - asp.net
  - blazor
  - ".net developer"
  - ".net engineer"
  - ".net core"

keywords_broad:
  - software engineer
  - software developer
  - backend developer
  - back-end developer
  - full stack
  - fullstack
  - full-stack

tech_context_hints:
  - "c#"
  - .net
  - dotnet
  - asp.net
  - azure
  - entity framework
  - blazor
  - microsoft
  - csharp
  - ".net core"

# A posting's location string must contain at least one of these.
location_allow:
  - montreal
  - montréal
  - ottawa
  - quebec
  - québec
  - ontario
  - canada
  - spain
  - españa
  - madrid
  - barcelona
  - valencia
  - sevilla
  - remote
  - worldwide
  - emea
  - europe
  - latam

# A posting matching any of these is dropped before scoring.
location_deny_phrases:
  - "us only"
  - "u.s. only"
  - "united states only"
  - "must reside in the us"
  - "must reside in the united states"
  - "us citizens only"
  - "u.s. citizens only"
  - "us work authorization required"
  - "must be authorized to work in the united states"
  - "h1b"
  - "h-1b"
  - "tn visa"
  - "active us security clearance"
  - "secret clearance required"
  - "ts/sci"

# Cost guard: max postings per run that may be sent to the Claude API.
# If exceeded, the run aborts with an error.
max_scoring_calls_per_run: 200

# Pending postings whose source feed has not re-listed them in this many days
# get auto-marked as expired (assumed pulled/filled). They are resurrected
# automatically if the source lists them again later.
pending_grace_days: 30

# Backend-language signals that tilt a posting's score before it hits the
# Claude rubric. The scorer tokenises the JD, counts hits in each tier, and
# passes a numeric modifier into the prompt as {{stack_modifier}} so the
# model knows how to weight the posting:
#
#   primary:    .NET-stack signals — a hit gives +2.
#   adjacent:   stack-adjacent (frontend, complementary) — a hit gives +0.
#   mismatched: backend stacks that aren't .NET — without a primary hit,
#               a mismatched-only posting gets -2 (Java/Python/Node
#               shops crowd out .NET roles in "full stack" feeds).
#
# Modifier is computed once per posting and applied to the model's returned
# score, clamped to [1, 10].
stack_signals:
  primary:
    - ".NET"
    - "C#"
    - "ASP.NET"
    - "dotnet"
    - "Blazor"
    - ".NET Core"
    - ".NET 8"
  adjacent:
    - "TypeScript"
    - "React"
    - "Angular"
    - "JavaScript"
  mismatched:
    - "Java"
    - "Spring"
    - "Python"
    - "Django"
    - "Node.js"
    - "Kotlin"
    - "Ruby on Rails"
    - "Golang"
    - "PHP"

# Title- and JD-keyword signals that modify the score after the model returns.
# These reflect the candidate's actual experience profile (see data/eligibility.md):
# search-platform background at canada.ca, accessibility / WET-BOEW production
# work, and 0 years of paid .NET production. The post-hoc modifier is summed
# with stack_signals and applied to the model's match_score, clamped to [1, 10].
#
#   senior_title_terms + senior_years_thresholds → -2
#       (both must hit; a "Senior" title alone without a years threshold is
#       not necessarily a deal-breaker, but "Senior" + "5+ years cloud / .NET"
#       is.)
#   search_platform_terms in title → +1
#   accessibility_canada_ca_terms in title or body → +1
title_signals:
  senior_title_terms:
    - "senior"
    - "staff"
    - "principal"
    - "lead"
    - "architect"
  # Any explicit years requirement (3+ and up) trips senior_mismatch when paired
  # with a senior title — the candidate has 0 paid production .NET years, so a
  # JD asking for "Senior X with 3+ years production .NET" is no more realistic
  # than one asking for 5+. The earlier 5+ floor missed M3usa-style "3+ years"
  # JDs entirely, which kept routing through the model unmodified.
  senior_years_thresholds:
    - "3+ years"
    - "3 or more years"
    - "minimum 3 years"
    - "at least 3 years"
    - "4+ years"
    - "4 or more years"
    - "minimum 4 years"
    - "at least 4 years"
    - "5+ years"
    - "5 or more years"
    - "minimum 5 years"
    - "at least 5 years"
    - "6+ years"
    - "minimum 6 years"
    - "at least 6 years"
    - "7+ years"
    - "8+ years"
    - "at least 8 years"
    - "10+ years"
  senior_mismatch_modifier: -2
  search_platform_terms:
    - "search engineer"
    - "search platform"
    - "search operations"
    - "search specialist"
    - "site search"
  search_platform_boost: 1
  accessibility_canada_ca_terms:
    - "wcag"
    - "accessibility"
    - "gcweb"
    - "wet-boew"
    - "canada.ca"
  accessibility_canada_ca_boost: 1
