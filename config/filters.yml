# Filter configuration — applied before any posting hits the Claude API.
#
# Two-tier keyword scheme:
#   keywords_core:        any one of these alone passes (.NET-specific signal)
#   keywords_broad:       only counts if also paired with a tech_context_hint
#                          anywhere in the title or description
#   tech_context_hints:   .NET / Microsoft-stack signals that "save" a broad
#                          keyword like "software engineer" from being too generic
#
# Rationale: "software engineer" alone matches Rails, Python, Go, JS-only roles
# we don't want. Pairing it with .NET context drops most non-.NET noise.

keywords_core:
  - .net
  - "c#"
  - dotnet
  - asp.net
  - blazor
  - ".net developer"
  - ".net engineer"
  - ".net core"

keywords_broad:
  - software engineer
  - software developer
  - backend developer
  - back-end developer
  - full stack
  - fullstack
  - full-stack

tech_context_hints:
  - "c#"
  - .net
  - dotnet
  - asp.net
  - azure
  - entity framework
  - blazor
  - microsoft
  - csharp
  - ".net core"

# A posting's location string must contain at least one of these.
location_allow:
  - montreal
  - montréal
  - ottawa
  - quebec
  - québec
  - ontario
  - canada
  - spain
  - españa
  - madrid
  - barcelona
  - valencia
  - sevilla
  - remote
  - worldwide
  - emea
  - europe
  - latam

# A posting matching any of these is dropped before scoring.
location_deny_phrases:
  - "us only"
  - "u.s. only"
  - "united states only"
  - "must reside in the us"
  - "must reside in the united states"
  - "us citizens only"
  - "u.s. citizens only"
  - "us work authorization required"
  - "must be authorized to work in the united states"
  - "h1b"
  - "h-1b"
  - "tn visa"
  - "active us security clearance"
  - "secret clearance required"
  - "ts/sci"

# Cost guard: max postings per run that may be sent to the Claude API.
# If exceeded, the run aborts with an error.
max_scoring_calls_per_run: 200

# Pending postings whose source feed has not re-listed them in this many days
# get auto-marked as expired (assumed pulled/filled). They are resurrected
# automatically if the source lists them again later.
pending_grace_days: 30
